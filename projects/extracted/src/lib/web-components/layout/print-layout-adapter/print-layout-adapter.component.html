<div [id]="printerId" class="print-header">
  <table cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td class="print-header-logo">
        <img
          [src]="logo()"
          alt="Logo"
          [style.width.px]="logoWidth()"
          (load)="onImageLoaded()"
          (error)="onImageError()" />
      </td>
      <td class="print-header-info">
        @if (showTimestamp()) {
          <div>Generated At: {{ getTimestamp() }}</div>
        }
        @if (showUserEmail()) {
          <div>Generated By: {{ getCurrentUserEmail() }}</div>
        }

        @if (referenceId()) {
          <div>Reference Id: {{ referenceId() }}</div>
        }
      </td>
    </tr>
  </table>
  @if (title()) {
    <h1>{{ title() }}</h1>
  }
</div>
