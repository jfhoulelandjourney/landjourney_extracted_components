<div class="password-strength-validator">
  <h4 class="requirements-title">Password Requirements</h4>

  <div class="requirements-list">
    @for (requirement of requirementsList(); track requirement.key) {
      <div
        class="requirement-item"
        [ngClass]="getValidationClass(requirement.isValid)">
        <mat-icon class="requirement-icon">
          {{ getValidationIcon(requirement.isValid) }}
        </mat-icon>
        <span class="requirement-text">{{ requirement.text }}</span>
      </div>
    }
  </div>
</div>
