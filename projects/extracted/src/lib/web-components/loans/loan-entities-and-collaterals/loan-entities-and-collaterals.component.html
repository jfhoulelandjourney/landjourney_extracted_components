<div class="container">
  <div class="accordion">
    <div class="accordion-header">
      <div
        class="accordion-header-item details-header"
        [class.open]="panelOpen()"
        (activate)="toggle()">
        <div class="entities">
          <div class="parties">
            <p class="body-s inter">Responsible Parties</p>
            <lj-grouped-avatar
              [entities]="getFormattedEntities()"></lj-grouped-avatar>
          </div>

          <div class="collaterals">
            <p class="body-s inter">Collaterals</p>
            <lj-grouped-avatar
              [entities]="getFormattedCollaterals()"></lj-grouped-avatar>
          </div>
        </div>
        <mat-icon>expand_more</mat-icon>
      </div>
    </div>

    <mat-expansion-panel class="mat-elevation-z0" [expanded]="panelOpen()">
      <div class="content">
        <lj-loan-entities [entities]="entities()" />
        @if (showCollaterals()) {
          <lj-loan-collaterals [collaterals]="collaterals()" />
        }
      </div>
    </mat-expansion-panel>
  </div>
</div>
