<mat-select
  lj-select
  [id]="id"
  [required]="required"
  [disabled]="disabled"
  [value]="innerValue"
  multiple
  (selectionChange)="handleUserRolesSelectionChange($event)">
  <mat-select-trigger>
    {{ triggerLabelList | list }}
  </mat-select-trigger>
  <mat-option [value]="allOption.value">
    {{ allOption.label }}
  </mat-option>
  @for (option of userRolesOptions; track option.value) {
    <mat-option [value]="option.value">
      {{ option.label }}
    </mat-option>
  }
</mat-select>
