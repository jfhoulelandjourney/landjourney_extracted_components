<div class="container" [class.mobile]="isMobile()">
  <mat-icon class="check-icon">check</mat-icon>
  <p class="title-xl inter title">
    @if (fallback()) {
      {{ name() }}'s identity could not be verified automatically and has been
      submitted for manual review.
    } @else {
      {{ name() }}'s identity has been successfully submitted for manual review.
    }
  </p>

  <button class="lj-button next-button" (activate)="next.emit()">
    Continue
    <mat-icon class="continue-icon">double_arrow</mat-icon>
  </button>
</div>
