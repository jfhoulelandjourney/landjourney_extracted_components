@if (field()) {
  @if (mode() === 'locked') {
    <div class="locked-display">
      <div [class.locked-error]="getErrorMessage() !== undefined">
        <div
          class="body-sm title"
          [style]="getCustomStyle('.field-title', true)">
          {{ field().label }}
        </div>
        <lj-copy-to-clipboard-button [value]="formatMoney(field().value)">
          <div class="body-sm text" [style]="getCustomStyle('.field-text', true)">
            {{ formatMoney(field().value) }}
          </div>
        </lj-copy-to-clipboard-button>
        @if (getErrorMessage()) {
          <div class="body-sm">
            {{ getErrorMessage() }}
          </div>
        }
      </div>
    </div>
  } @else {
    <div class="input" [class.style-normal]="style() === 'normal'">
      <lj-input-field
        [id]="field().id"
        [required]="field().required ?? false"
        [name]="field().name"
        [label]="field().label"
        [style]="style()"
        [customCssTitleStyle]="getCustomStyle('.field-title', true)"
        [customCssStyle]="getCustomStyle('.input-field', true)"
        type="text"
        [placeholder]="field().parameters.placeholder || '$ ___.__'"
        [ngModel]="formatMoney(field().value)"
        (ngModelChange)="handleValueChange($event)"
        (onInputBlur)="handleOnBlur()"
        [mask]="moneyMask"
        [showError]="!(touched() && isErrorSuppressed())"
        [customErrorMessage]="touched() ? getErrorMessage() : undefined" />
    </div>
  }
} @else {
  <div class="error">Field initialization error</div>
}
