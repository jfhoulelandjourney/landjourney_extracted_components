@if (mode() === 'locked') {
  <div class="locked-display">
    <div [class.locked-error]="getErrorMessage() !== undefined">
      <div class="body-sm title" [style]="getCustomStyle('.field-title', true)">
        {{ field().label }}
      </div>
      <lj-copy-to-clipboard-button [value]="getDisplayDate()">
        <div class="body-sm text" [style]="getCustomStyle('.field-text', true)">
          {{ getDisplayDate() }}
        </div>
      </lj-copy-to-clipboard-button>
      @if (getErrorMessage()) {
        <div class="body-sm">
          {{ getErrorMessage() }}
        </div>
      }
    </div>
  </div>
} @else {
  <div class="input" [class.style-normal]="style() === 'normal'">
    <lj-date-field
      id="date"
      name="date"
      type="date"
      [placeholder]="field().parameters.placeholder ?? 'MM/DD/YYYY'"
      [label]="field().label"
      [id]="field().id"
      [name]="field().id"
      [style]="style()"
      [customCssTitleStyle]="getCustomStyle('.field-title', true)"
      [customCssStyle]="getCustomStyle('.input-field', true)"
      [required]="field().required ?? false"
      [value]="valueAsDate()"
      [minDate]="minDate()"
      [maxDate]="maxDate()"
      (dateSelected)="handleDateChange($event)"
      (onInputBlur)="handleOnBlur()"
      [showError]="!(touched() && isErrorSuppressed())"
      [customErrorMessage]="touched() ? getErrorMessage() : undefined" />
  </div>
}
