@if (mode() === 'locked') {
  <div class="locked-display">
    <div [class.locked-error]="getErrorMessage() !== undefined">
      <div class="body-sm title" [style]="getCustomStyle('.field-title', true)">
        {{ field().label }}
      </div>
      <lj-copy-to-clipboard-button [value]="field().value ? 'Yes' : 'No'">
        <div class="body-sm text" [style]="getCustomStyle('.field-text', true)">
          {{ field().value ? 'Yes' : 'No' }}
        </div>
      </lj-copy-to-clipboard-button>
      @if (getErrorMessage()) {
        <div class="body-sm">
          {{ getErrorMessage() }}
        </div>
      }
    </div>
  </div>
} @else {
  <div class="slide-toggle" [class.style-gray]="style() === 'gray'">
    <div class="title" [style]="getCustomStyle('.field-title', true)">
      {{ field().label }}
    </div>
    <div class="toggle" (activate)="handleValueChange(!field().value)">
      <div
        class="boolean-type false"
        [class.selected]="!field().value"
        [style]="
          !field().value ? getCustomStyle('.toggle-unselected', true) : ''
        "></div>
      <div
        class="boolean-type"
        [class.selected]="field().value"
        [style]="
          field().value ? getCustomStyle('.toggle-selected', true) : ''
        "></div>
    </div>
  </div>
}
